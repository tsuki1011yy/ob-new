services:
  ombre-brain:
    build: .
    container_name: ombre-brain
    restart: unless-stopped
    command: ["python", "server.py"]
    env_file:
      - .env
    environment:
      OMBRE_TRANSPORT: streamable-http
      OMBRE_BUCKETS_DIR: /data
      OMBRE_STATE_DIR: /state
      OMBRE_ENV_PATH: /app/.env
      OMBRE_GATEWAY_ADMIN_URL: http://ombre-gateway:8010/api/config
    ports:
      - "18001:8000"
    volumes:
      - /srv/ombre-brain/buckets:/data
      - /srv/ombre-brain/state:/state
      - /srv/ombre-brain/config.yaml:/app/config.yaml
      - /opt/Ombre-Brain/.env:/app/.env

  ombre-gateway:
    build: .
    container_name: ombre-gateway
    restart: unless-stopped
    command: ["python", "gateway.py"]
    env_file:
      - .env
    environment:
      OMBRE_TRANSPORT: streamable-http
      OMBRE_BUCKETS_DIR: /data
      OMBRE_STATE_DIR: /state
    ports:
      - "18002:8010"
    volumes:
      - /srv/ombre-brain/buckets:/data
      - /srv/ombre-brain/state:/state
      - /srv/ombre-brain/config.yaml:/app/config.yaml:ro
